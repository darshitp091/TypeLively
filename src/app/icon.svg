<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <!-- Round Fluffy Bird Body -->
  <circle cx="16" cy="16" r="14" fill="#ffeaa7" stroke="#e17055" stroke-width="1.5" />
  
  <!-- Cute Chest Patch -->
  <ellipse cx="16" cy="22" rx="9" ry="7" fill="white" />
  
  <!-- Orange Smiling Beak -->
  <polygon points="16,13 12,17 20,17" fill="#ff7675" stroke="#d63031" stroke-width="0.75" />
  
  <!-- Shiny Anime Eyes -->
  <g>
    <!-- Left Eye -->
    <ellipse cx="10" cy="11" rx="2.5" ry="3.5" fill="#2d3436" />
    <ellipse cx="9.2" cy="9.8" rx="1" ry="1.4" fill="white" />
    <circle cx="11" cy="12.5" r="0.4" fill="white" />

    <!-- Right Eye -->
    <ellipse cx="22" cy="11" rx="2.5" ry="3.5" fill="#2d3436" />
    <ellipse cx="21.2" cy="9.8" rx="1" ry="1.4" fill="white" />
    <circle cx="23" cy="12.5" r="0.4" fill="white" />
  </g>
  
  <!-- Cute Cheek Blush -->
  <circle cx="6.5" cy="15" r="1.5" fill="#ff7675" opacity="0.6" />
  <circle cx="25.5" cy="15" r="1.5" fill="#ff7675" opacity="0.6" />
</svg>
